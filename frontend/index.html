<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chating-Painting · 语音绘图工具</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 顶部状态栏：显示语音模式与系统状态 -->
  <header class="topbar">
    <h1 class="title">🎨 Chating-Painting</h1>
    <div class="status" id="status">
      <span class="status-dot" id="statusDot" aria-hidden="true"></span>
      <span class="status-text" id="statusText">未启动</span>
    </div>
  </header>

  <!-- 主画布区域 -->
  <main class="stage">
    <canvas id="canvas" aria-label="绘图画布"></canvas>

    <!-- 启动遮罩：浏览器要求首次开启麦克风必须有一次用户手势。
         这是整个应用唯一需要的手动操作，点击后即进入全程语音控制。 -->
    <div class="overlay" id="startOverlay">
      <div class="overlay-card">
        <div class="overlay-icon">🎙️</div>
        <h2>点击任意处，开启语音控制</h2>
        <p class="overlay-hint">
          浏览器要求首次使用麦克风需一次点击授权。<br />
          之后全程用语音控制，无需再次点击。
        </p>
        <p class="overlay-browser">建议使用 Chrome / Edge 浏览器</p>
      </div>
    </div>
  </main>

  <!-- 底部反馈区：显示语音识别原文与系统提示 -->
  <footer class="feedback">
    <div class="heard">
      <span class="label">听到：</span>
      <span class="heard-text" id="heardText">—</span>
    </div>
    <div class="reply">
      <span class="label">系统：</span>
      <span class="reply-text" id="replyText">点击页面任意处开启语音识别，然后说「开始绘图」。</span>
    </div>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/store.js"></script>
  <script src="js/drawing.js"></script>
  <script src="js/colors.js"></script>
  <script src="js/position.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/reference.js"></script>
  <script src="js/clarifier.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/voicemode.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
